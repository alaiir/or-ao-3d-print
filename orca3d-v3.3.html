// ── 3MF PARSER CORRIGIDO (com suporte a namespaces) ──
async function parse3MF(buf) {
  try {
    const zip = await JSZip.loadAsync(buf);
    const modelFile = zip.file(/\.model$/i)[0];
    if (!modelFile) throw new Error('Nenhum arquivo .model encontrado no 3MF');
    const xml = await modelFile.async('string');
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'application/xml');
    const findElem = (elem) => doc.querySelector(elem) || doc.getElementsByTagNameNS('*', elem)[0];
    const vertices = [];
    const positions = [];
    let model = findElem('model');
    if (!model) throw new Error('Elemento <model> não encontrado');
    let resources = model.querySelector('resources') || findElem('resources');
    if (!resources) resources = model;
    const vertexNodes = resources.querySelectorAll('vertex, [xmlns|="vertex"]');
    for (const v of vertexNodes) {
      const x = parseFloat(v.getAttribute('x') || 0);
      const y = parseFloat(v.getAttribute('y') || 0);
      const z = parseFloat(v.getAttribute('z') || 0);
      vertices.push([x, y, z]);
    }
    if (vertices.length === 0) throw new Error('Nenhum vértice encontrado');
    const objects = resources.querySelectorAll('object');
    for (const obj of objects) {
      const mesh = obj.querySelector('mesh, [xmlns|="mesh"]');
      if (!mesh) continue;
      const triangles = mesh.querySelectorAll('triangle, [xmlns|="triangle"]');
      for (const tri of triangles) {
        const v1 = parseInt(tri.getAttribute('v1'));
        const v2 = parseInt(tri.getAttribute('v2'));
        const v3 = parseInt(tri.getAttribute('v3'));
        if (vertices[v1] && vertices[v2] && vertices[v3]) {
          positions.push(...vertices[v1], ...vertices[v2], ...vertices[v3]);
        }
      }
    }
    if (positions.length === 0) throw new Error('Nenhum triângulo encontrado');
    const arr = new Float32Array(positions);
    return { v: arr, n: new Float32Array(arr.length), t: positions.length / 9 };
  } catch (e) {
    console.error('Erro parse3MF:', e);
    throw new Error('Falha ao ler arquivo 3MF: ' + e.message);
  }
}

async function updateCalcCounter() {
  try {
    const res = await fetch('/api/counter?action=get');
    const data = await res.json();
    const counterEl = document.getElementById('calc-counter');
    if (counterEl && data.calculos !== undefined) {
      counterEl.textContent = data.calculos.toLocaleString('pt-BR');
    }
    localStorage.setItem('orca3d_last_calc', Date.now().toString());
    return data.calculos;
  } catch (err) {
    console.warn('Erro ao buscar contador:', err);
    return null;
  }
}

async function incrementCalcCounter() {
  try {
    const res = await fetch('/api/counter?action=calc');
    const data = await res.json();
    const counterEl = document.getElementById('calc-counter');
    if (counterEl && data.calculos !== undefined) {
      counterEl.textContent = data.calculos.toLocaleString('pt-BR');
    }
    localStorage.setItem('orca3d_last_calc', Date.now().toString());
    return data.calculos;
  } catch (err) {
    console.warn('Erro ao incrementar contador:', err);
    return null;
  }
}

// ═══════════════════════════════════════
//  DO CALC (SUBSTITUIR O FETCH ANTIGO)
// ═══════════════════════════════════════
function doCalc() {
  if (!S.volume) { toast('Carregue um modelo primeiro!','err'); return; }
  const mat = MATS.find(m => m.id === selectedMatId);
  if (!mat) return;
  const fp   = +document.getElementById('filprice').value;
  const mc   = +document.getElementById('machcost').value;
  const lc   = +document.getElementById('laborcost').value;
  const ec   = +document.getElementById('energycost').value;
  const inf  = +document.getElementById('infill').value;
  const lh   = +document.getElementById('layerh').value / 100;
  const spd  = +document.getElementById('speed').value;
  const sup  = +document.getElementById('support').value;
  const post = +document.getElementById('postproc').value;
  const qty  = Math.max(1, +document.getElementById('qty').value || 1);
  const dens = mat.density, matN = mat.id;

  const effVol  = S.volume * (inf/100) * 1.18;
  const grams   = GC.loaded && GC.grams   ? GC.grams
                : MAN.active && MAN.grams  ? MAN.grams
                : effVol * dens;
  const filCost = (grams/1000) * fp;

  const b = S.bounds || {x:10,y:10,z:10};
  let timeH;
  if (GC.loaded && GC.timeH) timeH = GC.timeH;
  else if (MAN.active && MAN.timeH) timeH = MAN.timeH;
  else {
    const layers = b.y / lh;
    const travel = (b.x + b.z) * 2 * 2;
    timeH = (layers * travel / spd) / 3600 * 1.25;
    if (sup > 0) timeH *= (1 + sup/100);
  }

  const machCost  = timeH * mc;
  const laborCost = .25*lc + timeH*.1*lc;
  const engCost   = 0.15 * timeH * ec;
  const falhaPct  = Math.max(0, Math.min(100, +document.getElementById('falha-pct').value || 5)) / 100;
  const manutHora = +document.getElementById('manut-hora').value || 1.5;
  const risk      = (filCost + machCost) * (falhaPct / (1 - falhaPct || 0.001));
  const manutCost = timeH * manutHora;
  const totalUnit = filCost + machCost + laborCost + engCost + risk + manutCost + post;
  const total     = totalUnit * qty;

  const infoEl = document.getElementById('risco-info');
  if (infoEl) infoEl.textContent = `Falha ${(falhaPct*100).toFixed(0)}% · Manutenção R$${manutHora.toFixed(2)}/h · Impacto: +${brl(risk+manutCost)} por peça`;

  S.costs = { fil:filCost, mach:machCost, labor:laborCost, energy:engCost, risk, manut:manutCost, post, totalUnit, total, matName:matN, timeH, grams, qty, falhaPct };

  // ── Incrementa contador de cálculos (CORRIGIDO) ──
  incrementCalcCounter().catch(()=>{});

  renderResults();
}
