<html lang="pt-BR">

<body>
<!-- ... todo o HTML da landing page (hero, features, preview, etc.) permanece igual ... -->

<!-- Counter Strip (já existe) -->
<div class="counter-strip">
  <div class="counter-item"><div class="counter-dot pulse"></div><div><div class="counter-val loading" id="cnt-total">—</div><div class="counter-label">Visitas totais</div></div></div>
  <div class="counter-sep"></div>
  <div class="counter-item"><div class="counter-dot sky pulse" style="animation-delay:.4s"></div><div><div class="counter-val loading" id="cnt-today">—</div><div class="counter-label">Hoje</div></div></div>
  <div class="counter-sep"></div>
  <div class="counter-item"><div class="counter-dot amber"></div><div><div class="counter-val" id="cnt-calc" style="color:var(--lime)">—</div><div class="counter-label">Cálculos feitos</div></div></div>
</div>

<!-- Footer (mantido) -->
<footer>...</footer>

<script>
// ============================================================
// SCRIPT CORRIGIDO DA LANDING PAGE (com polling e storage)
// ============================================================

// ── Custom cursor, navbar scroll, scroll reveal (mantidos) ──
// ... (todo o código existente da landing page, exceto a função loadCounters) ...

// ── NOVA FUNÇÃO LOADCOUNTERS (melhorada) ──
async function loadCounters() {
  function fmt(n) {
    if (!n || isNaN(n)) return '0';
    if (n >= 1000) return (n/1000).toFixed(1).replace('.',',') + 'k';
    return parseInt(n).toLocaleString('pt-BR');
  }

  function setVal(id, val, color) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('loading');
    const target = parseInt(val) || 0;
    const t0 = performance.now();
    function tick(now) {
      const p = Math.min((now - t0) / 1000, 1);
      const e = 1 - Math.pow(1-p, 3);
      el.textContent = fmt(Math.floor(e * target));
      if (color) el.style.color = color;
      if (p < 1) requestAnimationFrame(tick);
      else el.textContent = fmt(target);
    }
    requestAnimationFrame(tick);
  }

  try {
    const res = await fetch('/api/counter?action=get', { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    setVal('cnt-total', data.total,    'var(--tx)');
    setVal('cnt-today', data.today,    'var(--sky)');
    setVal('cnt-calc',  data.calculos, 'var(--lime)');
  } catch(e) {
    console.warn('Erro ao buscar contadores, usando fallback local', e);
    const localTotal = localStorage.getItem('orca3d_visit_total') || 738;
    const localCalc   = localStorage.getItem('orca3d_calc_count')  || 800;
    setVal('cnt-total', localTotal, 'var(--tx)');
    setVal('cnt-today', 0,          'var(--sky)');
    setVal('cnt-calc',  localCalc,  'var(--lime)');
  }
}

// Polling a cada 30 segundos
let pollingInterval;
function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(loadCounters, 30000);
}

// Sincronização entre abas via storage event
window.addEventListener('storage', (e) => {
  if (e.key === 'orca3d_last_calc') {
    loadCounters();
  }
});

// Inicialização
window.addEventListener('DOMContentLoaded', () => {
  loadCounters();
  startPolling();
  // ... (todo o resto do código de inicialização da landing page: animações, observadores, etc.) ...
});
</script>
</body>
</html>
